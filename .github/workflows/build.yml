name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the build (e.g. v2.0.1). Leave blank for a dev build.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Build
        shell: pwsh
        run: ./build-ci.ps1 -Configuration Release

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}'
          if ($ver -notmatch '^v') { $ver = '${{ github.event.inputs.version }}' }
          if ([string]::IsNullOrWhiteSpace($ver)) { $ver = "dev-$(Get-Date -Format yyyyMMdd-HHmm)" }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $ver"

      - name: Package
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.version }}'
          $zip = "NovaNetX-VPN-$ver-win-x64.zip"
          Compress-Archive -Path release\* -DestinationPath $zip -Force
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -Encoding ascii "$zip.sha256"
          Write-Host "Packaged $zip"
          Write-Host "SHA256: $hash"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaNetX-VPN-${{ steps.ver.outputs.version }}-win-x64
          path: |
            NovaNetX-VPN-*-win-x64.zip
            NovaNetX-VPN-*-win-x64.zip.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NovaNetX VPN ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            NovaNetX-VPN-*-win-x64.zip
            NovaNetX-VPN-*-win-x64.zip.sha256
